<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llogaria Ime - Solavie</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.account-page {
  max-width: 480px;
  margin: 80px auto;
  padding: 40px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}

.account-page h1 {
  font-size: 26px;
  margin-bottom: 24px;
  text-align: center;
}

.account-page input {
  display: block;
  width: 100%;
  padding: 10px 14px;
  margin-bottom: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
}

.account-page input:focus {
  border-color: #10b981;
}

.btn-login {
  width: 100%;
  padding: 11px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: background 0.2s;
}

.btn-login:hover { background: #333; }

.btn-register {
  width: 100%;
  padding: 11px;
  background: #10b981;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-register:hover { background: #0e9f6e; }

.btn-logout {
  width: 100%;
  padding: 11px;
  background: #e53e3e;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  margin-top: 16px;
  transition: background 0.2s;
}

.btn-logout:hover { background: #c53030; }

.account-info {
  text-align: center;
}

.account-avatar {
  width: 72px;
  height: 72px;
  background: #f0fdf4;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
  font-size: 32px;
}

.account-info h2 {
  font-size: 20px;
  margin-bottom: 4px;
}

.account-info p {
  color: #888;
  font-size: 14px;
  margin-bottom: 20px;
}

.account-links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
}

.account-links a {
  display: block;
  padding: 12px 16px;
  background: #f9f9f9;
  border-radius: 8px;
  text-decoration: none;
  color: #333;
  font-size: 14px;
  transition: background 0.2s;
}

.account-links a:hover { background: #f0fdf4; color: #10b981; }

.msg-box {
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 14px;
  font-size: 13px;
  display: none;
}

.msg-box.success { background: #d1fae5; color: #065f46; }
.msg-box.error   { background: #fee2e2; color: #991b1b; }

.tab-btns {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.tab-btn {
  flex: 1;
  padding: 9px;
  border: 1.5px solid #ddd;
  background: #fff;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab-btn.active {
  border-color: #10b981;
  color: #10b981;
  font-weight: 600;
}
</style>

</head>
<body>

<header class="header">
  <div class="logo">
    <a href="index.html">Solavie</a>
  </div>
</header>

<div class="account-page">

  <!-- LOGGED OUT VIEW -->
  <div id="loginView">
    <h1>👤 Llogaria Ime</h1>

    <div class="tab-btns">
      <button class="tab-btn active" id="tabLoginBtn" onclick="switchTab('login')">Hyr</button>
      <button class="tab-btn" id="tabRegisterBtn" onclick="switchTab('register')">Regjistrohu</button>
    </div>

    <div id="msgBox" class="msg-box"></div>

    <!-- Login form -->
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPass" placeholder="Fjalëkalimi">
      <button class="btn-login" onclick="doLogin()">Hyr</button>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none;">
      <input type="text" id="regUser" placeholder="Emri i përdoruesit">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPass" placeholder="Fjalëkalimi">
      <button class="btn-register" onclick="doRegister()">Regjistrohu</button>
    </div>
  </div>

  <!-- LOGGED IN VIEW -->
  <div id="loggedView" style="display:none;">
    <div class="account-info">
      <div class="account-avatar">👤</div>
      <h2 id="greetName"></h2>
      <p id="greetEmail"></p>
      <div class="account-links">
        <a href="orders.html">📦 Porositë e mia</a>
        <a href="wishlist.html">❤️ Lista e Dëshirave</a>
        <a href="loyalty.html">🎀 Programi i Besnikërisë</a>
        <a href="cart.html">🛒 Shporta</a>
      </div>
      <button class="btn-logout" onclick="doLogout()">Çkyçu</button>
    </div>
  </div>

</div>

<script>
function switchTab(tab) {
  document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tabLoginBtn').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegisterBtn').classList.toggle('active', tab === 'register');
  clearMsg();
}

function showMsg(text, type) {
  const el = document.getElementById('msgBox');
  el.textContent = text;
  el.className = 'msg-box ' + type;
  el.style.display = 'block';
}

function clearMsg() {
  const el = document.getElementById('msgBox');
  el.style.display = 'none';
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showMsg('Plotëso email dhe fjalëkalimin!', 'error'); return; }

  const users = JSON.parse(localStorage.getItem('solavieUsers') || '[]');
  const found = users.find(u => u.email === email && u.pass === pass);
  if (!found) { showMsg('Email ose fjalëkalim i gabuar!', 'error'); return; }

  localStorage.setItem('loggedUser', JSON.stringify(found));
  renderLoggedIn(found);
}

function doRegister() {
  const user  = document.getElementById('regUser').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!user || !email || !pass) { showMsg('Plotëso të gjitha fushat!', 'error'); return; }

  let users = JSON.parse(localStorage.getItem('solavieUsers') || '[]');
  if (users.find(u => u.email === email)) { showMsg('Ky email ekziston tashmë!', 'error'); return; }

  const newUser = { user, email, pass };
  users.push(newUser);
  localStorage.setItem('solavieUsers', JSON.stringify(users));
  localStorage.setItem('loggedUser', JSON.stringify({ user, email }));
  renderLoggedIn({ user, email });
}

function doLogout() {
  localStorage.removeItem('loggedUser');
  document.getElementById('loggedView').style.display = 'none';
  document.getElementById('loginView').style.display  = 'block';
}

function renderLoggedIn(u) {
  document.getElementById('loginView').style.display  = 'none';
  document.getElementById('loggedView').style.display = 'block';
  document.getElementById('greetName').textContent  = '👋 ' + (u.user || u.email);
  document.getElementById('greetEmail').textContent = u.email || '';
}

(function init() {
  const logged = JSON.parse(localStorage.getItem('loggedUser') || 'null');
  if (logged) renderLoggedIn(logged);
})();
</script>

<script src="chatbot-widget.js"></script>
</body>
</html>
