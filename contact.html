<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kontakt - Solavie</title>

<link rel="stylesheet" href="style.css">

<style>
.contact-container {
  padding: 60px;
  text-align: center;
}

.contact-container h1 {
  font-size: 40px;
  margin-bottom: 40px;
}

.contact-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  max-width: 1000px;
  margin: auto;
}

.contact-box {
  text-align: center;
}

.contact-box svg {
  width: 50px;
  height: 50px;
  stroke: #10b981;
  margin-bottom: 15px;
}

.contact-box h3 {
  margin-bottom: 8px;
}

.contact-box p {
  color: #666;
  font-size: 14px;
}
</style>

</head>

<body>

<header class="header">
  <div class="logo">
    <a href="index.html">Solavie</a>
  </div>
</header>

<section class="contact-container">

<h1>Kontakt</h1>

<div class="contact-grid">


  <div class="contact-box">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M12 21s-6-5.5-6-10a6 6 0 1 1 12 0c0 4.5-6 10-6 10z"/>
      <circle cx="12" cy="11" r="2"/>
    </svg>
    <h3>Adresa</h3>
    <p>Rruga Selaudin Zorba, Tirane</p>
  </div>

  <div class="contact-box">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <rect x="7" y="2" width="10" height="20" rx="2"/>
      <circle cx="12" cy="18" r="1"/>
    </svg>
    <h3>Numri telefoni</h3>
    <p>+355683439365</p>
  </div>


  <div class="contact-box">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="5" width="18" height="14" rx="2"/>
      <path d="M3 7l9 6 9-6"/>
    </svg>
    <h3>E-mail</h3>
    <p>info@solavie.al</p>
  </div>


  <div class="contact-box">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <h3>Orari</h3>
    <p>E Hene - E Diele / 09:00–22:00</p>
  </div>

</div>

</section>

</body>
</html>
