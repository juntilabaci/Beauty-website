<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loyalty Program - Solavie</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="loyalty-container">

  <h1>Welcome</h1>
  <p>Sign in to unlock exclusive features</p>

  <div class="loyalty-buttons">
    <button class="join">Join now</button>
    <button class="login">Log in</button>
  </div>

</div>

<div class="loyalty-sections">

  <div class="loyalty-card">
    <h3>Earn Points on Every Purchase</h3>
    <p>Earn 1 point for every Lek 1 spent on completed orders.</p>
  </div>

  <div class="loyalty-card">
    <h3>New Member Bonus</h3>
    <p>Create an account and earn points on your first purchase.</p>
  </div>

  <div class="loyalty-card">
    <h3>Invite a friend</h3>
    <p>Get discounts when your friends join.</p>
  </div>

</div>

</body>
</html>
