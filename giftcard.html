<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift Card - Solavie</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
.giftcard-page {
  max-width: 680px;
  margin: 70px auto;
  padding: 50px 40px;
  text-align: center;
}

.giftcard-page h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.giftcard-page .subtitle {
  font-size: 15px;
  color: #888;
  margin-bottom: 40px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}

.gc-card {
  background: linear-gradient(135deg, #111 0%, #333 100%);
  color: #fff;
  border-radius: 14px;
  padding: 28px 16px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
}

.gc-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}

.gc-card.selected {
  border-color: #10b981;
}

.gc-card .amount {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 4px;
}

.gc-card .label {
  font-size: 12px;
  opacity: 0.7;
}

.send-form {
  background: #fff;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  text-align: left;
}

.send-form h3 {
  font-size: 18px;
  margin-bottom: 20px;
}

.send-form input,
.send-form textarea {
  display: block;
  width: 100%;
  padding: 10px 14px;
  margin-bottom: 14px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border 0.2s;
  font-family: inherit;
}

.send-form input:focus,
.send-form textarea:focus {
  border-color: #10b981;
}

.send-form textarea {
  resize: none;
  height: 80px;
}

.selected-amount {
  font-size: 13px;
  color: #10b981;
  margin-bottom: 14px;
  font-weight: 600;
}

.btn-buy {
  width: 100%;
  padding: 13px;
  background: #111;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-buy:hover { background: #333; }

.success-msg {
  display: none;
  background: #d1fae5;
  color: #065f46;
  border-radius: 10px;
  padding: 16px;
  font-size: 14px;
  margin-top: 16px;
  text-align: center;
}
</style>

</head>
<body>

<header class="header">
  <div class="logo">
    <a href="index.html">Solavie</a>
  </div>
</header>

<div class="giftcard-page">
  <h1>🎁 Gift Card</h1>
  <p class="subtitle">Dhuro bukurinë — zgjedh një vlerë dhe dërgo direkt te personi i dashur.</p>

  <div class="cards-grid">
    <div class="gc-card" onclick="selectCard(this, 10)">
      <div class="amount">€10</div>
      <div class="label">Gift Card</div>
    </div>
    <div class="gc-card" onclick="selectCard(this, 25)">
      <div class="amount">€25</div>
      <div class="label">Gift Card</div>
    </div>
    <div class="gc-card" onclick="selectCard(this, 50)">
      <div class="amount">€50</div>
      <div class="label">Gift Card</div>
    </div>
  </div>

  <div class="send-form">
    <h3>Dërgo Gift Card</h3>
    <p class="selected-amount" id="selectedTxt">Zgjedh një vlerë më lart</p>
    <input type="text"  id="senderName"  placeholder="Emri juaj">
    <input type="email" id="recipientEmail" placeholder="Email i marrësit">
    <textarea id="giftMsg" placeholder="Shkruaj një mesazh personal (opsionale)..."></textarea>
    <button class="btn-buy" onclick="sendGift()">Dërgo Gift Card</button>
    <div class="success-msg" id="successMsg">
      ✅ Gift Card u dërgua me sukses! Marrësi do të marrë email-in brenda pak minutash.
    </div>
  </div>
</div>

<script>
let selectedValue = 0;

function selectCard(el, val) {
  document.querySelectorAll('.gc-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedValue = val;
  document.getElementById('selectedTxt').textContent = 'Vlera e zgjedhur: €' + val;
}

function sendGift() {
  const sender = document.getElementById('senderName').value.trim();
  const email  = document.getElementById('recipientEmail').value.trim();

  if (!selectedValue) { alert('Zgjedh një vlerë Gift Card!'); return; }
  if (!sender)  { alert('Shkruaj emrin tënd!'); return; }
  if (!email)   { alert('Shkruaj email-in e marrësit!'); return; }

  document.getElementById('successMsg').style.display = 'block';
  document.getElementById('senderName').value    = '';
  document.getElementById('recipientEmail').value = '';
  document.getElementById('giftMsg').value        = '';
  document.querySelectorAll('.gc-card').forEach(c => c.classList.remove('selected'));
  selectedValue = 0;
  document.getElementById('selectedTxt').textContent = 'Zgjedh një vlerë më lart';
}
</script>

<script src="chatbot-widget.js"></script>
</body>
</html>
